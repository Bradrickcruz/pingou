services:
  pingou:
    build:
      context: .
      args:
        VERSION: "1.0.0"
        COMMIT: "local"
        BUILD_DATE: "2025-01-01"
    ports:
      - "8080:8080"
    environment:
      - PINGOU_PORT=8080
      - PINGOU_DATABASE_URL=/data/pingou.db
      - PINGOU_API_KEY=dev-api-key
      - PINGOU_LOG_LEVEL=info
    volumes:
      - pingou_data:/data
    restart: unless-stopped

volumes:
  pingou_data:
